<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Todo</title>
<style>
  :root {
    --bg: #f6f7fb;
    --surface: #ffffff;
    --text: #1a1d24;
    --muted: #6b7280;
    --border: #e5e7eb;
    --accent: #4f46e5;
    --accent-weak: #eef2ff;
    --danger: #dc2626;
    --low: #059669;
    --med: #d97706;
    --high: #dc2626;
    --focus: #6366f1;
    --shadow: 0 1px 2px rgba(0,0,0,.04), 0 4px 12px rgba(0,0,0,.04);
  }
  [data-theme="dark"] {
    --bg: #0f1115;
    --surface: #171a21;
    --text: #e6e8ee;
    --muted: #9aa3b2;
    --border: #262b36;
    --accent: #818cf8;
    --accent-weak: #1f2340;
    --danger: #f87171;
    --low: #34d399;
    --med: #fbbf24;
    --high: #f87171;
    --focus: #a5b4fc;
    --shadow: 0 1px 2px rgba(0,0,0,.4), 0 4px 14px rgba(0,0,0,.4);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font: 15px/1.45 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh;
    transition: background .2s, color .2s;
  }
  .wrap { max-width: 760px; margin: 0 auto; padding: 24px 16px 80px; }
  header {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; margin-bottom: 16px;
  }
  header h1 { font-size: 1.5rem; margin: 0; letter-spacing: -0.01em; }
  .theme-btn {
    background: var(--surface); color: var(--text);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 8px 12px; cursor: pointer; font-size: 14px;
  }
  .theme-btn:hover { border-color: var(--accent); }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; box-shadow: var(--shadow); padding: 16px;
  }
  .add-row {
    display: grid; gap: 8px;
    grid-template-columns: 1fr 120px 150px auto;
  }
  @media (max-width: 640px) {
    .add-row { grid-template-columns: 1fr 1fr; }
    .add-row .add-btn { grid-column: 1 / -1; }
  }
  input, select, button {
    font: inherit; color: inherit;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 12px; outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  input:focus, select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-weak);
  }
  .add-btn {
    background: var(--accent); color: #fff; border-color: var(--accent);
    cursor: pointer; font-weight: 600;
  }
  .add-btn:hover { filter: brightness(1.08); }
  .toolbar {
    display: flex; gap: 8px; margin: 16px 0 10px; flex-wrap: wrap;
    align-items: center;
  }
  .search { flex: 1; min-width: 180px; }
  .filters { display: inline-flex; gap: 4px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 10px; padding: 4px; }
  .filters button {
    border: none; background: transparent; padding: 6px 12px;
    border-radius: 7px; cursor: pointer; color: var(--muted);
  }
  .filters button[aria-pressed="true"] {
    background: var(--accent-weak); color: var(--accent); font-weight: 600;
  }
  ul.list { list-style: none; padding: 0; margin: 12px 0 0; }
  li.item {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 10px; align-items: center;
    padding: 12px; margin-bottom: 8px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; box-shadow: var(--shadow);
  }
  li.item .main { min-width: 0; }
  li.item .title { font-weight: 500; word-break: break-word; }
  li.item.done .title { text-decoration: line-through; color: var(--muted); }
  li.item .meta {
    display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px;
    font-size: 12px; color: var(--muted);
  }
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 999px;
    font-size: 11px; font-weight: 600; letter-spacing: .02em;
    text-transform: uppercase;
  }
  .badge.low  { background: color-mix(in srgb, var(--low) 18%, transparent);  color: var(--low); }
  .badge.med  { background: color-mix(in srgb, var(--med) 18%, transparent);  color: var(--med); }
  .badge.high { background: color-mix(in srgb, var(--high) 18%, transparent); color: var(--high); }
  .due.overdue { color: var(--danger); font-weight: 600; }
  .actions { display: inline-flex; gap: 4px; }
  .icon-btn {
    background: transparent; border: 1px solid transparent;
    padding: 6px 8px; border-radius: 8px; cursor: pointer;
    color: var(--muted); font-size: 14px;
  }
  .icon-btn:hover { background: var(--accent-weak); color: var(--accent); border-color: var(--border); }
  .icon-btn.danger:hover { background: color-mix(in srgb, var(--danger) 14%, transparent); color: var(--danger); }
  .check {
    width: 22px; height: 22px; cursor: pointer;
    accent-color: var(--accent);
  }
  .edit-input { width: 100%; }
  .empty {
    padding: 40px 16px; text-align: center; color: var(--muted);
  }
  .footer-bar {
    margin-top: 10px; display: flex; justify-content: space-between;
    color: var(--muted); font-size: 13px; padding: 0 4px;
  }
  .clear-done {
    background: transparent; border: none; color: var(--muted);
    cursor: pointer; padding: 4px 6px; border-radius: 6px;
  }
  .clear-done:hover { color: var(--danger); background: color-mix(in srgb, var(--danger) 10%, transparent); }
  .sr-only {
    position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
    overflow: hidden; clip: rect(0,0,0,0); border: 0;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Todo</h1>
    <button type="button" class="theme-btn" id="themeBtn"
            aria-label="Toggle color theme">🌙 Dark</button>
  </header>

  <section class="card" aria-labelledby="addHeading">
    <h2 id="addHeading" class="sr-only">Add a todo</h2>
    <form id="addForm" class="add-row" autocomplete="off">
      <label class="sr-only" for="newText">Task</label>
      <input id="newText" type="text" placeholder="What needs doing?" required />
      <label class="sr-only" for="newPriority">Priority</label>
      <select id="newPriority" aria-label="Priority">
        <option value="low">Low</option>
        <option value="med" selected>Medium</option>
        <option value="high">High</option>
      </select>
      <label class="sr-only" for="newDue">Due date</label>
      <input id="newDue" type="date" aria-label="Due date" />
      <button class="add-btn" type="submit">Add</button>
    </form>
  </section>

  <div class="toolbar" role="toolbar" aria-label="Filter and search">
    <label class="sr-only" for="search">Search todos</label>
    <input id="search" class="search" type="search"
           placeholder="Search…  (press / to focus)" />
    <div class="filters" role="group" aria-label="Filter by status">
      <button type="button" data-filter="all"       aria-pressed="true">All</button>
      <button type="button" data-filter="active"    aria-pressed="false">Active</button>
      <button type="button" data-filter="completed" aria-pressed="false">Completed</button>
    </div>
  </div>

  <ul id="list" class="list" aria-live="polite"></ul>
  <div id="empty" class="empty" hidden>Nothing here yet. Add your first task above.</div>

  <div class="footer-bar">
    <span id="count">0 items</span>
    <button id="clearDone" class="clear-done" type="button">Clear completed</button>
  </div>
</div>

<script>
(() => {
  const STORAGE_KEY   = 'todo.v1.items';
  const THEME_KEY     = 'todo.v1.theme';
  const $ = s => document.querySelector(s);

  const state = {
    items:  load(),
    filter: 'all',
    query:  '',
    editing: null,
  };

  function load() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { return []; }
  }
  function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.items)); }
  function uid()  { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
  function esc(s) { return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    $('#themeBtn').textContent = t === 'dark' ? '☀️ Light' : '🌙 Dark';
    localStorage.setItem(THEME_KEY, t);
  }
  applyTheme(localStorage.getItem(THEME_KEY) || 'light');

  function filtered() {
    const q = state.query.trim().toLowerCase();
    return state.items.filter(it => {
      if (state.filter === 'active'    && it.done) return false;
      if (state.filter === 'completed' && !it.done) return false;
      if (q && !it.text.toLowerCase().includes(q)) return false;
      return true;
    });
  }

  function render() {
    const list  = $('#list');
    const items = filtered();
    list.innerHTML = '';
    $('#empty').hidden = items.length !== 0;

    const today = new Date().toISOString().slice(0, 10);

    for (const it of items) {
      const li = document.createElement('li');
      li.className = 'item' + (it.done ? ' done' : '');
      li.dataset.id = it.id;

      const overdue = it.due && !it.done && it.due < today;
      const dueTxt  = it.due ? `📅 ${it.due}` : '';

      li.innerHTML = state.editing === it.id ? `
        <input type="checkbox" class="check" ${it.done ? 'checked' : ''}
               aria-label="Mark complete" />
        <div class="main">
          <input class="edit-input" value="${esc(it.text)}"
                 aria-label="Edit task" />
        </div>
        <div class="actions">
          <button class="icon-btn save" aria-label="Save">✓</button>
          <button class="icon-btn cancel" aria-label="Cancel">✕</button>
        </div>
      ` : `
        <input type="checkbox" class="check" ${it.done ? 'checked' : ''}
               aria-label="Mark complete" />
        <div class="main">
          <div class="title">${esc(it.text)}</div>
          <div class="meta">
            <span class="badge ${it.priority}">${it.priority.toUpperCase()}</span>
            ${dueTxt ? `<span class="due ${overdue ? 'overdue' : ''}">${dueTxt}${overdue ? ' (overdue)' : ''}</span>` : ''}
          </div>
        </div>
        <div class="actions">
          <button class="icon-btn edit"   aria-label="Edit">✎</button>
          <button class="icon-btn danger delete" aria-label="Delete">🗑</button>
        </div>
      `;
      list.appendChild(li);

      if (state.editing === it.id) {
        const inp = li.querySelector('.edit-input');
        inp.focus();
        inp.setSelectionRange(inp.value.length, inp.value.length);
      }
    }

    const remaining = state.items.filter(i => !i.done).length;
    $('#count').textContent =
      `${remaining} ${remaining === 1 ? 'item' : 'items'} left` +
      ` · ${state.items.length} total`;
  }

  // ---- events ---------------------------------------------------------
  $('#addForm').addEventListener('submit', e => {
    e.preventDefault();
    const text = $('#newText').value.trim();
    if (!text) return;
    state.items.unshift({
      id: uid(), text, done: false,
      priority: $('#newPriority').value,
      due: $('#newDue').value || '',
      created: Date.now(),
    });
    $('#newText').value = '';
    $('#newDue').value  = '';
    save(); render();
  });

  $('#list').addEventListener('click', e => {
    const li = e.target.closest('li.item'); if (!li) return;
    const id = li.dataset.id;
    const it = state.items.find(x => x.id === id);
    if (!it) return;

    if (e.target.classList.contains('check')) {
      it.done = e.target.checked; save(); render();
    } else if (e.target.classList.contains('delete')) {
      state.items = state.items.filter(x => x.id !== id); save(); render();
    } else if (e.target.classList.contains('edit')) {
      state.editing = id; render();
    } else if (e.target.classList.contains('save')) {
      const v = li.querySelector('.edit-input').value.trim();
      if (v) it.text = v;
      state.editing = null; save(); render();
    } else if (e.target.classList.contains('cancel')) {
      state.editing = null; render();
    }
  });

  $('#list').addEventListener('keydown', e => {
    if (!e.target.classList.contains('edit-input')) return;
    if (e.key === 'Enter')  { e.preventDefault(); e.target.closest('li').querySelector('.save').click(); }
    if (e.key === 'Escape') { e.preventDefault(); state.editing = null; render(); }
  });

  $('#search').addEventListener('input', e => {
    state.query = e.target.value; render();
  });

  document.querySelectorAll('.filters button').forEach(b => {
    b.addEventListener('click', () => {
      state.filter = b.dataset.filter;
      document.querySelectorAll('.filters button').forEach(x =>
        x.setAttribute('aria-pressed', x === b ? 'true' : 'false'));
      render();
    });
  });

  $('#clearDone').addEventListener('click', () => {
    state.items = state.items.filter(i => !i.done);
    save(); render();
  });

  $('#themeBtn').addEventListener('click', () => {
    const cur = document.documentElement.getAttribute('data-theme') || 'light';
    applyTheme(cur === 'dark' ? 'light' : 'dark');
  });

  document.addEventListener('keydown', e => {
    const tag = (e.target.tagName || '').toLowerCase();
    const typing = tag === 'input' || tag === 'textarea' || tag === 'select';
    if (e.key === '/' && !typing) {
      e.preventDefault(); $('#search').focus(); $('#search').select();
    }
  });

  render();
})();
</script>
</body>
</html>
