project: testproject-todo
cwd: G:\_OneDrive\OneDrive\Desktop\Py Apps\wezbridge\tests\testproject-todo
roles:
  - name: frontend
    persona: coder
    permission_mode: bypassPermissions
    tab_title: todo-frontend
    prompt: |
      Design and build a **feature-rich todo app UI** in a single self-contained HTML file.

      Save the file at `frontend.html` in your current working directory using the Write tool.

      Required features (use your judgement on exact implementation):
      - Add, edit, delete todos
      - Mark complete / incomplete (with strikethrough)
      - Filter: all / active / completed
      - Priority tags (low / medium / high) — selectable when adding, displayed as a coloured badge
      - Optional due date field
      - Search box that filters the visible list live
      - Keyboard shortcuts: Enter to add, Escape to cancel-edit, `/` to focus search
      - localStorage persistence so refresh preserves state
      - Dark/light theme toggle (persisted)
      - Responsive layout (mobile + desktop)
      - Accessible: proper labels, ARIA where needed, keyboard-navigable

      Inline CSS + inline JS. No build tools, no frameworks. Aim for ~250-400 lines.

      Use the Write tool NOW. After saving, read back the first few lines to confirm it landed, then output exactly:

      DECISION: deliverable — frontend.html complete (<lines> lines, <bytes> bytes).

      Then stop. Do not edit anything else. Do not wait for peer panes.

  - name: backend
    persona: dev-backend-api
    permission_mode: bypassPermissions
    tab_title: todo-backend
    prompt: |
      Design and build a **feature-rich Flask REST API** for a todo app in a single Python file.

      Save the file at `backend.py` in your current working directory using the Write tool.

      Required endpoints (decide status codes + response shapes yourself):
      - `GET /todos` with query params: `status` (all/active/completed), `priority` (low/medium/high), `q` (search text)
      - `POST /todos` — validate required `text`, optional `priority`, `due_date`; reject missing/bad input with 400
      - `PATCH /todos/<id>` — edit text, priority, due_date
      - `DELETE /todos/<id>` — 404 if not found
      - `PUT /todos/<id>/complete` — toggle complete flag
      - `GET /todos/stats` — returns {total, active, completed, by_priority}

      Include:
      - In-memory storage with auto-incrementing integer IDs + created_at + updated_at timestamps
      - CORS headers (`Access-Control-Allow-Origin: *`) for browser dev
      - Logging via `app.logger` for each mutation
      - A `/health` endpoint returning `{ok: true}`

      No database, no auth — this is a local-only dev API. Aim for ~120-200 lines.

      Use the Write tool NOW. After saving, output:

      DECISION: deliverable — backend.py complete (<lines> lines, <bytes> bytes).

      Then stop.

  - name: reviewer
    persona: reviewer
    permission_mode: bypassPermissions
    tab_title: todo-reviewer
    prompt: |
      Your task: review `frontend.html` + `backend.py` in this cwd, produce `review.md`.

      **Use the Bash tool** to run this one-liner (waits up to 10 minutes for both files):

      while [ ! -f frontend.html ] || [ ! -f backend.py ]; do sleep 15; done && echo BOTH_READY

      Once you see `BOTH_READY`, use the Read tool to read both files in full. Then use the Write tool to save `review.md` with this shape (fill with REAL findings from the specific code you read):

      ## Summary
      Three sentences describing what you reviewed + overall impression.

      ## Security findings (at least 5)
      - finding 1 ...
      - finding 2 ...
      - ...

      ## Quality findings (at least 4)
      - finding 1 ...
      - finding 2 ...
      - ...

      ## Recommended next actions (at least 3)
      - action 1 ...
      - action 2 ...
      - ...

      Cite line numbers or identifier names from the actual files when relevant. Be specific — avoid generic "consider adding validation" fluff. Aim for ~150-250 lines of markdown.

      After saving, output:

      DECISION: deliverable — review.md complete (<lines> lines, <bytes> bytes).

      Then stop.
