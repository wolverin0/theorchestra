project: testproject-landingpage
cwd: G:\_OneDrive\OneDrive\Desktop\Py Apps\wezbridge\tests\testproject-landingpage
roles:
  - name: frontend
    persona: coder
    permission_mode: bypassPermissions
    tab_title: landing-frontend
    prompt: |
      Design and build a **feature-rich landing-page designer** (playground) as a single self-contained HTML file.

      Save at `landing.html` in your current working directory using the Write tool.

      Required sections (implement all five):
      - Hero (headline, subhead, CTA button)
      - Features (3 cards: icon/emoji + heading + paragraph)
      - Testimonials (3 quotes with author + company)
      - Pricing (3 tiers: free/pro/enterprise)
      - Footer (copyright + social links)

      For EACH section, expose at least TWO live sliders (`<input type="range">`) that bind via vanilla JS to CSS custom properties on `:root` (e.g. `--hero-pad`, `--hero-fs`, `--card-gap`, `--pricing-accent-h`, etc).

      Plus:
      - Master theme toggle: dark / light (persisted)
      - "Reset to defaults" button — restores all sliders to their initial values
      - "Export current config as JSON" button — downloads a .json file of the current CSS custom property values
      - localStorage persistence for every slider value + theme
      - Responsive layout (mobile + desktop)
      - Link a companion stylesheet: `<link rel="stylesheet" href="sliders.css">` (the styling role will write it)

      Inline CSS + JS for behaviour; rely on sliders.css for the design tokens + slider thumb styling. Aim for ~300-450 lines.

      Use the Write tool NOW. After saving, output:

      DECISION: deliverable — landing.html complete (<lines> lines, <bytes> bytes).

      Then stop.

  - name: styling
    persona: coder
    permission_mode: bypassPermissions
    tab_title: landing-styling
    prompt: |
      Design and build a **design-tokens + slider stylesheet** for a landing-page designer playground.

      Save at `sliders.css` in your current working directory using the Write tool.

      Required contents:
      - `:root` block defining at least **10 CSS custom properties** for tokens: palette (primary, secondary, accent, neutral-fg, neutral-bg), typography (fs-body, fs-hero, line-height), spacing (section-pad, card-gap), and slider (slider-track, slider-thumb).
      - `@media (prefers-color-scheme: dark)` variant that overrides palette tokens — plus `.theme-light` / `.theme-dark` class overrides so the companion JS theme-toggle works.
      - Custom `<input type="range">` thumb + track styling: `-webkit-slider-thumb`, `::-moz-range-thumb`, track bar, focus outline for a11y.
      - Typography scale (h1, h2, h3, p) using the token properties.
      - Button primary + secondary styles with hover + active + focus-visible states.
      - `.card` utility for the feature/pricing/testimonial cards with a subtle shadow token.
      - A `prefers-reduced-motion: reduce` block that disables non-essential transitions.

      Aim for ~100-180 lines of real CSS. Real selectors, real values. No placeholder comments.

      Use the Write tool NOW. After saving, output:

      DECISION: deliverable — sliders.css complete (<lines> lines, <bytes> bytes).

      Then stop.

  - name: reviewer
    persona: reviewer
    permission_mode: bypassPermissions
    tab_title: landing-reviewer
    prompt: |
      Your task: review `landing.html` + `sliders.css` in this cwd, produce `review.md`.

      **Use the Bash tool** to run this one-liner (waits up to 10 min for both files):

      while [ ! -f landing.html ] || [ ! -f sliders.css ]; do sleep 15; done && echo BOTH_READY

      Once you see `BOTH_READY`, Read both files in full. Then Write `review.md` with this shape (fill with REAL findings — cite actual selectors, property names, line numbers):

      ## Summary
      Three sentences: what was reviewed + overall design impression + standout feature.

      ## Design feedback (at least 4)
      - finding 1 (visual consistency / hierarchy / spacing)
      - finding 2 (responsive behaviour)
      - finding 3 (slider UX)
      - finding 4 (theme toggle experience)

      ## Technical feedback (at least 4)
      - finding 1 (HTML semantics)
      - finding 2 (CSS token architecture)
      - finding 3 (JS code structure)
      - finding 4 (persistence + export logic)

      ## Accessibility audit (at least 3)
      - finding 1 (keyboard navigation)
      - finding 2 (ARIA / labels)
      - finding 3 (color contrast or motion)

      ## Recommended next actions (at least 3)
      - action 1
      - action 2
      - action 3

      Aim for ~180-280 lines of markdown. Be specific — cite identifiers, CSS tokens, line numbers.

      After saving, output:

      DECISION: deliverable — review.md complete (<lines> lines, <bytes> bytes).

      Then stop.
